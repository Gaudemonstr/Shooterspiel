<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Spiel</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }
        #game-container {
            text-align: center;
        }
        h1 {
            color: #eee;
            margin-bottom: 10px;
        }
        p {
            color: #aaa;
            margin-bottom: 20px;
        }
        #score {
            color: #fff;
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>🎮 Herzlich willkommen zum Spielen</h1>
        <p>Pfeiltasten zum Bewegen | Leertaste zum Schießen</p>
        <div id="game-canvas"></div>
        <div id="score">Treffer: 0 | Verloren: 0</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script>
// ============ SPIELER KLASSE ============
class Spieler {
    constructor(startX, startY) {
        this.x = startX;
        this.y = startY;
        this.speed = 3;
        this.size = 30;
    }

    move() {
        if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) { // Links oder A
            this.x = max(this.size / 2, this.x - this.speed);
        }
        if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) { // Rechts oder D
            this.x = min(width - this.size / 2, this.x + this.speed);
        }
        if (keyIsDown(UP_ARROW) || keyIsDown(87)) { // Hoch oder W
            this.y = max(this.size / 2, this.y - this.speed);
        }
        if (keyIsDown(DOWN_ARROW) || keyIsDown(83)) { // Runter oder S
            this.y = min(height - this.size / 2, this.y + this.speed);
        }
    }

    draw() {
        fill('#3498db');
        stroke('#2980b9');
        strokeWeight(2);
        circle(this.x, this.y, this.size);
        
        // Kleine Augen für Charakter
        fill('#fff');
        noStroke();
        circle(this.x - 5, this.y - 3, 6);
        circle(this.x + 5, this.y - 3, 6);
        fill('#000');
        circle(this.x - 4, this.y - 3, 3);
        circle(this.x + 6, this.y - 3, 3);
    }
}

// ============ GLOBALE VARIABLEN ============
let spieler;
let frameCounter = 0;
let projekArray = [];
let hitcounter = 0;
let deadcounter = 0;
let canShoot = true;
let shotCooldown = 30; // Frames zwischen Schüssen

// Gegner (Ziel)
let projektil = {
    x: 400,
    y: 250,
    speedX: 2,
    speedY: 1.5,
    size: 20
};

// ============ P5.JS SETUP ============
function setup() {
    let canvas = createCanvas(500, 500);
    canvas.parent('game-canvas');
    
    // Spieler initialisieren
    spieler = new Spieler(100, 250);
    
    describe('Ein Spiel mit einem blauen Spieler und einem gelben Ziel. Bewege dich mit den Pfeiltasten und schieße mit der Leertaste.');
}

// ============ P5.JS DRAW LOOP ============
function draw() {
    // Hintergrund
    background('#2d5a27');
    
    // Gras-Textur simulieren
    stroke('#3d6a37');
    strokeWeight(1);
    for (let i = 0; i < width; i += 20) {
        for (let j = 0; j < height; j += 20) {
            line(i, j, i + 5, j + 10);
        }
    }
    
    // Spieler bewegen
    spieler.move();
    
    // Schießen mit Leertaste
    if (keyIsDown(32) && canShoot && frameCounter >= shotCooldown) {
        projekArray.push({
            x: spieler.x + spieler.size / 2,
            y: spieler.y,
            speed: 5
        });
        frameCounter = 0;
    }
    
    // Projektile zeichnen und bewegen
    projekArray = projekArray.filter(proj => {
        // Zeichnen
        fill('#ff6b6b');
        noStroke();
        circle(proj.x, proj.y, 8);
        
        // Bewegen
        proj.x += proj.speed;
        
        // Kollision mit Ziel prüfen
        let dist = Math.sqrt(
            Math.pow(proj.x - projektil.x, 2) + 
            Math.pow(proj.y - projektil.y, 2)
        );
        
        if (dist < (projektil.size / 2 + 4)) {
            hitcounter++;
            updateScore();
            showExplosion(projektil.x, projektil.y);
            resetProjektil();
            return false; // Projektil entfernen
        }
        
        // Entfernen wenn außerhalb
        return proj.x < width + 10;
    });
    
    // Ziel (Gegner) bewegen
    moveProjektil();
    
    // Ziel zeichnen
    drawProjektil();
    
    // Kollision Spieler mit Ziel prüfen
    checkPlayerCollision();
    
    // Spieler zeichnen (über allem)
    spieler.draw();
    
    // Frame Counter erhöhen
    frameCounter++;
}

// ============ HILFSFUNKTIONEN ============
function moveProjektil() {
    projektil.x += projektil.speedX;
    projektil.y += projektil.speedY;
    
    // An Wänden abprallen
    if (projektil.x <= projektil.size / 2 || projektil.x >= width - projektil.size / 2) {
        projektil.speedX *= -1;
    }
    if (projektil.y <= projektil.size / 2 || projektil.y >= height - projektil.size / 2) {
        projektil.speedY *= -1;
    }
    
    // Im Spielfeld halten
    projektil.x = constrain(projektil.x, projektil.size / 2, width - projektil.size / 2);
    projektil.y = constrain(projektil.y, projektil.size / 2, height - projektil.size / 2);
}

function drawProjektil() {
    // Schatten
    fill(0, 0, 0, 50);
    noStroke();
    ellipse(projektil.x + 3, projektil.y + 3, projektil.size, projektil.size);
    
    // Hauptkörper
    fill('#f1c40f');
    stroke('#d4ac0d');
    strokeWeight(2);
    circle(projektil.x, projektil.y, projektil.size);
    
    // Böses Gesicht
    fill('#000');
    noStroke();
    // Augen
    circle(projektil.x - 4, projektil.y - 2, 4);
    circle(projektil.x + 4, projektil.y - 2, 4);
    // Mund
    arc(projektil.x, projektil.y + 4, 8, 4, 0, PI);
}

function resetProjektil() {
    projektil.x = random(width * 0.5, width - 50);
    projektil.y = random(50, height - 50);
    // Etwas schneller nach jedem Treffer
    projektil.speedX = (random() > 0.5 ? 1 : -1) * (2 + hitcounter * 0.2);
    projektil.speedY = (random() > 0.5 ? 1 : -1) * (1.5 + hitcounter * 0.15);
}

function checkPlayerCollision() {
    let dist = Math.sqrt(
        Math.pow(spieler.x - projektil.x, 2) + 
        Math.pow(spieler.y - projektil.y, 2)
    );
    
    if (dist < (spieler.size / 2 + projektil.size / 2 - 5)) {
        deadcounter++;
        updateScore();
        showHit(spieler.x, spieler.y);
        
        // Spieler zurücksetzen
        spieler.x = 100;
        spieler.y = 250;
        
        // Ziel zurücksetzen
        resetProjektil();
    }
}

function updateScore() {
    document.getElementById('score').innerHTML = 
        `Treffer: ${hitcounter} | Verloren: ${deadcounter}`;
}

// Visuelle Effekte
let explosions = [];

function showExplosion(x, y) {
    for (let i = 0; i < 10; i++) {
        explosions.push({
            x: x,
            y: y,
            vx: random(-3, 3),
            vy: random(-3, 3),
            life: 30,
            color: random(['#f1c40f', '#e74c3c', '#e67e22'])
        });
    }
}

function showHit(x, y) {
    for (let i = 0; i < 8; i++) {
        explosions.push({
            x: x,
            y: y,
            vx: random(-2, 2),
            vy: random(-2, 2),
            life: 20,
            color: '#ff0000'
        });
    }
}

// Explosionen in draw() integrieren (am Ende der draw Funktion hinzufügen)
let originalDraw = draw;
draw = function() {
    originalDraw();
    
    // Explosionen zeichnen
    explosions = explosions.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        
        fill(p.color);
        noStroke();
        circle(p.x, p.y, map(p.life, 0, 30, 2, 8));
        
        return p.life > 0;
    });
};
    </script>
</body>
